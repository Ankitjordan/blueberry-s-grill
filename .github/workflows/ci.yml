name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontened

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "./frontened/package-lock.json"

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

  backend-build-test:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Run Go Tests
        run: go test -v ./...

      - name: Build Go App
        run: go build -v ./...
